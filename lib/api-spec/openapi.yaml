openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AI Job Application Assistant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analyses
    description: Job application analysis operations
  - name: dashboard
    description: Dashboard and statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /analyses:
    get:
      operationId: listAnalyses
      tags: [analyses]
      summary: List all analyses for current user
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: List of analyses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAnalysesResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createAnalysis
      tags: [analyses]
      summary: Create a new job analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnalysisBody"
      responses:
        "201":
          description: Analysis created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analysis"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analyses/{id}:
    get:
      operationId: getAnalysis
      tags: [analyses]
      summary: Get a specific analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Analysis details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analysis"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAnalysis
      tags: [analyses]
      summary: Delete an analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted successfully
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analyses/{id}/cover-letter:
    post:
      operationId: generateCoverLetter
      tags: [analyses]
      summary: Generate a cover letter for an analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cover letter generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverLetterResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analyses/{id}/interview-questions:
    post:
      operationId: generateInterviewQuestions
      tags: [analyses]
      summary: Generate interview questions for an analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Interview questions generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewQuestionsResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics for current user
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/recent:
    get:
      operationId: getRecentAnalyses
      tags: [dashboard]
      summary: Get the 5 most recent analyses for current user
      responses:
        "200":
          description: Recent analyses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentAnalysesResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Analysis:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        jobTitle:
          type: string
        companyName:
          type: ["string", "null"]
        jobDescription:
          type: string
        cvText:
          type: string
        matchScore:
          type: ["integer", "null"]
        missingSkills:
          type: ["string", "null"]
        suggestions:
          type: ["string", "null"]
        coverLetter:
          type: ["string", "null"]
        interviewQuestions:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, completed, failed]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - jobTitle
        - jobDescription
        - cvText
        - status
        - createdAt
        - updatedAt

    CreateAnalysisBody:
      type: object
      properties:
        jobTitle:
          type: string
        companyName:
          type: ["string", "null"]
        jobDescription:
          type: string
        cvText:
          type: string
      required:
        - jobTitle
        - jobDescription
        - cvText

    ListAnalysesResponse:
      type: object
      properties:
        analyses:
          type: array
          items:
            $ref: "#/components/schemas/Analysis"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - analyses
        - total
        - page
        - limit

    CoverLetterResponse:
      type: object
      properties:
        coverLetter:
          type: string
      required:
        - coverLetter

    InterviewQuestionsResponse:
      type: object
      properties:
        questions:
          type: array
          items:
            type: string
      required:
        - questions

    DashboardStats:
      type: object
      properties:
        totalAnalyses:
          type: integer
        averageMatchScore:
          type: ["number", "null"]
        highMatchCount:
          type: integer
        recentActivity:
          type: integer
      required:
        - totalAnalyses
        - highMatchCount
        - recentActivity

    RecentAnalysesResponse:
      type: object
      properties:
        analyses:
          type: array
          items:
            $ref: "#/components/schemas/Analysis"
      required:
        - analyses
